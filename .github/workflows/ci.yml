name: CI

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "sdk/node/**"
      - "sdk/python/**"
      - "mcp/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "sdk/node/**"
      - "sdk/python/**"
      - "mcp/**"
      - ".github/workflows/ci.yml"

jobs:
  sdk-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/node/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # @otok/mcp depends on "@otok/node": "^0.6.0", which may not be on npm
      # yet when this runs — build the sibling workspace copy and pack it, so
      # the tarball satisfies the (unchanged) semver range. mcp/ has no
      # lockfile until the registry serves ^0.6.0 (see mcp/README.md).
      - name: Build + pack the local @otok/node
        working-directory: sdk/node
        run: |
          npm ci
          npm run build
          npm pack --pack-destination ../../mcp/.local
      - name: Install (tarball satisfies @otok/node ^0.6.0)
        working-directory: mcp
        run: npm install --no-save ./.local/otok-node-*.tgz
      - run: npm run typecheck
        working-directory: mcp
      - run: npm run build
        working-directory: mcp
      - run: npm test
        working-directory: mcp

  sdk-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy
      - run: pytest
