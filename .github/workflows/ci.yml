name: CI

on:
  pull_request:
    paths:
      - "sdk/node/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "sdk/node/**"
      - ".github/workflows/ci.yml"

jobs:
  sdk-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/node/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
