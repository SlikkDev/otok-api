name: Docs site

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "scripts/build-docs-site.mjs"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint OpenAPI spec
        run: npx -y @redocly/cli@latest lint docs/openapi.yaml
      - name: Build markdown pages
        run: |
          npm install --no-save marked
          node scripts/build-docs-site.mjs
      - name: Build API reference (Redoc)
        run: npx -y @redocly/cli@latest build-docs docs/openapi.yaml -o _site/reference/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
