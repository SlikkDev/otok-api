                updated_at: "2026-07-14T09:58:04.000Z"
                items:
                  - id: 1a2b3c4d-5e6f-4a0b-9c8d-7e6f5a4b3c2d
                    workspace_id: 0f1e2d3c-4b5a-4978-8796-a5b4c3d2e1f0
                    order_id: 5f6a7b8c-9d0e-4f1a-8b2c-3d4e5f6a7b8c
                    position: 0
